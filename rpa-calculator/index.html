<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Earnings Simulator — Equiti IB Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --navy:   #0A1826;
      --navy2:  #0D2437;
      --teal:   #00E5AC;
      --teal-d: #00C896;
      --teal-g: rgba(0,229,172,0.10);
      --border: rgba(255,255,255,0.09);
      --text:       #FFFFFF;
      --text-body:  #E4ECF5;
      --muted:      #9BB0C6;
      --dim:        #7C93AB;
      --faint:      #5E7A93;
    }

    html, body, #root {
      height: 100%; margin: 0; padding: 0;
      background:
        radial-gradient(1200px 600px at 15% -10%, rgba(0,229,172,0.06), transparent),
        radial-gradient(1000px 700px at 100% 10%, rgba(14,165,233,0.05), transparent),
        var(--navy);
      color: var(--text-body);
      font-family: "Inter", sans-serif;
      font-size: 18px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* ── Cards ── */
    .card {
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 20px;
    }
    .card-glow {
      background: linear-gradient(160deg, rgba(0,229,172,0.07), rgba(14,165,233,0.03));
      border: 1px solid rgba(0,229,172,0.28);
      border-radius: 26px;
      box-shadow: 0 0 100px rgba(0,229,172,0.10), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .card-blue {
      background: rgba(96,165,250,0.05);
      border: 1px solid rgba(96,165,250,0.18);
      border-radius: 18px;
    }

    /* ── Section label ── */
    .lbl {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── Account select button (opens picker) ── */
    .acct-select-btn {
      display: flex; align-items: center;
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(0,229,172,0.30);
      border-radius: 16px;
      padding: 18px 22px;
      cursor: pointer; transition: all 0.18s;
      font-family: inherit;
    }
    .acct-select-btn:hover {
      background: rgba(0,229,172,0.06);
      border-color: rgba(0,229,172,0.55);
    }
    .inst-count-chip {
      font-size: 14px; font-weight: 700; color: #00E5AC;
      background: rgba(0,229,172,0.12);
      padding: 6px 14px; border-radius: 99px;
      white-space: nowrap;
    }

    /* ── Big earnings number ── */
    .earnings-num {
      font-family: "JetBrains Mono", monospace;
      font-weight: 800;
      font-size: 128px;
      line-height: 1;
      letter-spacing: -6px;
      background: linear-gradient(130deg, #00FFC2 0%, #00E5AC 30%, #22D3EE 70%, #60A5FA 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Tier badges ── */
    .tier-badge {
      display: inline-flex; align-items: center;
      font-size: 13px; font-weight: 750;
      letter-spacing: 0.06em;
      padding: 7px 18px; border-radius: 99px; border: 1.5px solid;
    }
    .tier-entry        { color: #C3CEDA; border-color: rgba(195,206,218,0.40); background: rgba(195,206,218,0.10); }
    .tier-growth       { color: #7DB4FF; border-color: rgba(125,180,255,0.40); background: rgba(96,165,250,0.10);  }
    .tier-professional { color: #C4A8FF; border-color: rgba(196,168,255,0.40); background: rgba(167,139,250,0.10); }
    .tier-elite        { color: #F0C355; border-color: rgba(240,195,85,0.45);  background: rgba(212,175,55,0.10); }

    /* ── Metric pill ── */
    .metric-pill {
      flex: 1;
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px 22px;
    }

    /* ── Insight card ── */
    .insight-card {
      flex: 1;
      background: linear-gradient(160deg, rgba(0,229,172,0.055), rgba(0,229,172,0.015));
      border: 1px solid rgba(0,229,172,0.16);
      border-radius: 18px;
      padding: 24px 26px;
    }
    .insight-card-blue {
      background: linear-gradient(160deg, rgba(96,165,250,0.055), rgba(96,165,250,0.015));
      border: 1px solid rgba(96,165,250,0.16);
    }

    /* ── Tier track ── */
    .tier-track {
      height: 7px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px; overflow: hidden;
    }

    /* ── Preset buttons ── */
    .preset-btn {
      font-size: 16px; font-family: "JetBrains Mono", monospace; font-weight: 650;
      padding: 10px 18px; border-radius: 11px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: #9BB0C6; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .preset-btn:hover { color: #FFFFFF; border-color: rgba(255,255,255,0.22); }
    .preset-btn.active { background: rgba(0,229,172,0.16); border-color: rgba(0,229,172,0.50); color: var(--teal); }

    /* ── Instrument card ── */
    .inst-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 20px;
      padding: 26px 28px;
      transition: border-color 0.2s;
    }
    .inst-card:hover { border-color: rgba(255,255,255,0.18); }

    /* ── Lot input + stepper ── */
    .lot-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      border-left: none; border-right: none;
      color: #FFFFFF;
      font-family: "JetBrains Mono", monospace;
      font-size: 30px; font-weight: 750;
      padding: 15px 0;
      width: 108px; text-align: center;
      outline: none;
    }
    .lot-input-lg { font-size: 64px; width: 190px; padding: 18px 0; font-weight: 800; }
    .lot-input:focus { background: rgba(0,229,172,0.09); }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .stepper-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.14);
      color: #9BB0C6;
      padding: 0 22px;
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .stepper-lg { padding: 0 32px; }
    .stepper-l { border-radius: 14px 0 0 14px; }
    .stepper-r { border-radius: 0 14px 14px 0; }
    .stepper-btn:hover { background: rgba(0,229,172,0.14); color: #00E5AC; border-color: rgba(0,229,172,0.40); }
    .stepper-btn:active { background: rgba(0,229,172,0.22); }

    /* ── Remove button ── */
    .remove-btn {
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 11px;
      color: #9BB0C6; cursor: pointer; transition: all 0.15s;
    }
    .remove-btn:hover { background: rgba(248,113,113,0.14); border-color: rgba(248,113,113,0.45); color: #FCA5A5; }

    /* ── Add instrument button ── */
    .add-inst-btn {
      display: flex; align-items: center;
      width: 100%;
      background: rgba(0,229,172,0.06);
      border: 1.5px dashed rgba(0,229,172,0.38);
      border-radius: 18px;
      padding: 22px 26px;
      color: #00E5AC; cursor: pointer;
      font-size: 18px; font-weight: 700;
      transition: all 0.18s;
      gap: 14px; font-family: inherit;
    }
    .add-inst-btn:hover {
      background: rgba(0,229,172,0.11);
      border-color: rgba(0,229,172,0.65);
    }

    /* ── Instrument / account picker ── */
    .inst-picker {
      background: rgba(5,16,27,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 22px 24px;
      margin-top: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    }
    .search-wrap {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 13px 18px;
      margin-bottom: 20px;
    }
    .search-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: #FFFFFF; font-size: 17px; font-family: inherit;
    }
    .search-input::placeholder { color: #5E7A93; }

    .picker-row {
      display: flex; align-items: center; gap: 14px;
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 13px;
      padding: 15px 18px;
      cursor: pointer; transition: all 0.15s;
      font-family: inherit;
    }
    .picker-row:hover {
      background: rgba(0,229,172,0.09);
      border-color: rgba(0,229,172,0.35);
    }
    .picker-row-active {
      background: rgba(0,229,172,0.10);
      border-color: rgba(0,229,172,0.45);
    }
    .add-chip {
      font-size: 14px; font-weight: 700; color: #00E5AC;
      background: rgba(0,229,172,0.14);
      padding: 6px 14px; border-radius: 99px;
      margin-left: 8px; white-space: nowrap;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "htm": "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
